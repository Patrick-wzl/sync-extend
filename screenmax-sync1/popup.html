<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>ScreenMax Sync</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      color: #1f1f1f;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .status {
      min-height: 42px;
      padding: 10px;
      margin-bottom: 14px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      background: #fafafa;
      line-height: 1.45;
      word-break: break-all;
      white-space: pre-wrap;
    }

    button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #1677ff;
      border-radius: 6px;
      background: #1677ff;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      border-color: #d9d9d9;
      background: #f0f0f0;
      color: #8c8c8c;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>ScreenMax Sync</h1>
  <div id="status" class="status">Connecting...</div>
  <button id="requestBtn">Request assistance</button>

  <script src="popup.js"></script>
</body>
</html>
